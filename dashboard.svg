<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 884" width="900" height="884" font-family="'SF Mono','SFMono-Regular',ui-monospace,'DejaVu Sans Mono','Menlo','Consolas',monospace" role="img" aria-label="Vansh Gupta — backend and distributed-systems engineer at Smartsheet. What I work on: distributed systems, low-latency infrastructure, fault tolerance and observability, platform engineering. Stack: Java, C++, Python, SQL; Spring Boot, gRPC, Hibernate, Aeron; Kafka, RocksDB; AWS, Docker, Terraform, Kubernetes; Datadog, PagerDuty, WIZ; MySQL, PostgreSQL, MongoDB. Highlights: Codeforces Expert 1600+ rank 850; JEE Advanced AIR 9684; Kafka+RocksDB replication replacing Aeron; production SaaS connectors at Smartsheet.">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10182B"/><stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34E7E7"/><stop offset="0.5" stop-color="#5B8DEF"/><stop offset="1" stop-color="#9B8CFF"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.15 0; 0.15 0; -0.15 0" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="cyanG" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#34E7E7"/><stop offset="1" stop-color="#5BD7EF"/></linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cglow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="frame"><rect x="12" y="12" width="876" height="860" rx="18"/></clipPath>
    <clipPath id="roleClip"><rect x="44" y="144" width="0" height="26"><animate attributeName="width" from="0" to="640" dur="1.5s" begin="0.7s" fill="freeze"/></rect></clipPath>
  </defs>

  <rect x="0" y="0" width="900" height="884" fill="#0A0E17"/>
  <rect x="12" y="12" width="876" height="860" rx="18" fill="url(#card)" stroke="#1E2A44" stroke-width="1.5"/>
  <!-- faint constant aurora tint on the frame -->
  <rect x="12" y="12" width="876" height="860" rx="18" fill="none" stroke="url(#aurora)" stroke-width="1.5" opacity="0.22"/>
  <!-- the continuous comet of light running around the whole border -->
  <rect x="12" y="12" width="876" height="860" rx="18" fill="none" stroke="#7FF3FF" stroke-width="2.6" stroke-linecap="round" filter="url(#cglow)" pathLength="100" stroke-dasharray="16 84" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" values="100;0" dur="7s" repeatCount="indefinite"/>
  </rect>
  <!-- a second, dimmer trailing comet (indigo) chasing it -->
  <rect x="12" y="12" width="876" height="860" rx="18" fill="none" stroke="#9B8CFF" stroke-width="2.2" stroke-linecap="round" filter="url(#cglow)" pathLength="100" stroke-dasharray="9 91" stroke-dashoffset="55" opacity="0.7">
    <animate attributeName="stroke-dashoffset" values="55;-45" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- ===================== STATUS STRIP ===================== -->
  <g font-size="12.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.3s" fill="freeze"/>
    <circle cx="44" cy="42" r="4.5" fill="#46E08B"><animate attributeName="opacity" values="1;0.35;1" dur="2.2s" repeatCount="indefinite"/></circle>
    <text x="58" y="46"><tspan fill="#8499BE">service: </tspan><tspan fill="#DCE6F5">vansh-gupta</tspan><tspan fill="#3C4D6E">  //  </tspan><tspan fill="#46E08B">status: online</tspan></text>
    <text x="856" y="46" fill="#6F82A6" text-anchor="end">node: ap-south-1 · IN</text>
  </g>

  <!-- ===================== HERO ===================== -->
  <g filter="url(#glow)" opacity="0" transform="translate(0,10)">
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.35s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 10;0 0" dur="0.7s" begin="0.35s" fill="freeze"/>
    <text x="42" y="118" font-size="60" font-weight="700" letter-spacing="6" fill="url(#aurora)">VANSH GUPTA</text>
  </g>
  <text x="42" y="118" font-size="60" font-weight="700" letter-spacing="6" fill="url(#aurora)" opacity="0" filter="url(#glow)">VANSH GUPTA
    <animate attributeName="opacity" values="0;0.18;0" dur="4.5s" begin="2s" repeatCount="indefinite"/>
  </text>

  <g clip-path="url(#roleClip)" font-size="17.5">
    <text x="44" y="162"><tspan fill="#5B8DEF">&gt; </tspan><tspan fill="#C3D2EC">backend &amp; distributed-systems engineer </tspan><tspan fill="#FFB454">@ Smartsheet</tspan><tspan fill="#34E7E7" font-weight="700"> ▌<animate attributeName="opacity" values="1;1;0;0;1" dur="1s" begin="2.3s" repeatCount="indefinite"/></tspan></text>
  </g>

  <g font-size="12.5" opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="2.2s" fill="freeze"/>
    <g transform="translate(44,182)">
