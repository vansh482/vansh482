    <text x="44" y="865"><tspan fill="#52668C">p99 </tspan><tspan fill="#FFB454" font-weight="700">38µs</tspan><tspan fill="#2E3C57">   ·   </tspan><tspan fill="#52668C">replication </tspan><tspan fill="#46E08B">3/3 in-sync</tspan><tspan fill="#2E3C57">   ·   </tspan><tspan fill="#52668C">status </tspan><tspan fill="#9FE9E9">open to hard backend &amp; distributed-systems problems</tspan></text>
    <circle cx="846" cy="861" r="3.5" fill="#46E08B"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
