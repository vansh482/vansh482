  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.85s" fill="freeze"/>
    <rect x="44" y="708" width="4" height="16" rx="2" fill="#9B8CFF"/>
    <text x="58" y="721" font-size="13.5" letter-spacing="3" fill="#8FA3C6">A&#160;FEW&#160;THINGS&#160;I&#39;M&#160;PROUD&#160;OF</text>
    <text x="856" y="721" font-size="12.5" fill="#3C4D6E" text-anchor="end">$ ./highlights</text>

    <g font-size="13.5">
      <rect x="45" y="744" width="9" height="9" rx="1.5" fill="#34E7E7" transform="rotate(45 49.5 748.5)"/>
      <text x="64" y="752"><tspan fill="#9FE9E9" font-weight="700">Codeforces Expert</tspan><tspan fill="#8398B8" font-size="12.5"> — rating 1600+ · global rank #850, Round 896 (Div. 2)</tspan></text>

      <rect x="45" y="770" width="9" height="9" rx="1.5" fill="#5B8DEF" transform="rotate(45 49.5 774.5)"/>
      <text x="64" y="778"><tspan fill="#AFC3F0" font-weight="700">JEE Advanced</tspan><tspan fill="#8398B8" font-size="12.5"> — AIR 9684, among 1,000,000+ applicants nationwide</tspan></text>

      <rect x="45" y="796" width="9" height="9" rx="1.5" fill="#9B8CFF" transform="rotate(45 49.5 800.5)"/>
      <text x="64" y="804"><tspan fill="#C7BEF5" font-weight="700">Kafka + RocksDB replication</tspan><tspan fill="#8398B8" font-size="12.5"> — replaced Aeron middleware on trading servers</tspan></text>

      <rect x="45" y="822" width="9" height="9" rx="1.5" fill="#FFB454" transform="rotate(45 49.5 826.5)"/>
      <text x="64" y="830"><tspan fill="#FFD79A" font-weight="700">Production SaaS connectors</tspan><tspan fill="#8398B8" font-size="12.5"> — Dynamics 365 + Trello · bi-directional sync @ Smartsheet</tspan></text>
    </g>
  </g>

