  <line x1="44" y1="232" x2="856" y2="232" stroke="#172339" stroke-width="1"/>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.55s" fill="freeze"/>
    <rect x="44" y="250" width="4" height="16" rx="2" fill="#34E7E7"/>
    <text x="58" y="263" font-size="13.5" letter-spacing="3" fill="#8FA3C6">WHAT&#160;I&#160;WORK&#160;ON</text>
    <text x="856" y="263" font-size="12.5" fill="#3C4D6E" text-anchor="end">[ 04 ]</text>

    <circle cx="48" cy="296" r="4" fill="#34E7E7"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="1.6s" repeatCount="indefinite"/></circle>
    <text x="62" y="300" font-size="14.5" font-weight="700" fill="#9FE9E9">distributed-systems</text>
    <text x="62" y="319" font-size="12.5" fill="#9FB0CE">event-driven replication · keeping state in sync · designing for the failure case first</text>

    <circle cx="48" cy="342" r="4" fill="#5B8DEF"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="1.8s" repeatCount="indefinite"/></circle>
    <text x="62" y="346" font-size="14.5" font-weight="700" fill="#AFC3F0">low-latency-infra</text>
    <text x="62" y="365" font-size="12.5" fill="#9FB0CE">memory layout, threading, and hot-path tuning — habits that stuck from trading systems</text>

    <circle cx="48" cy="388" r="4" fill="#9B8CFF"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="2.0s" repeatCount="indefinite"/></circle>
    <text x="62" y="392" font-size="14.5" font-weight="700" fill="#C7BEF5">fault-tolerance + observability</text>
    <text x="62" y="411" font-size="12.5" fill="#9FB0CE">services that fail gracefully and tell you why — wired through Datadog / PagerDuty</text>

    <circle cx="48" cy="434" r="4" fill="#FFB454"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="2.2s" repeatCount="indefinite"/></circle>
    <text x="62" y="438" font-size="14.5" font-weight="700" fill="#FFCE8A">platform-engineering</text>
    <text x="62" y="457" font-size="12.5" fill="#9FB0CE">monolith decomposition · MySQL query-plan tuning · production SaaS connectors</text>
  </g>

  <!-- ===================== STACK ===================== -->
  <line x1="44" y1="478" x2="856" y2="478" stroke="#172339" stroke-width="1"/>
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.7s" fill="freeze"/>
    <rect x="44" y="496" width="4" height="16" rx="2" fill="#5B8DEF"/>
    <text x="58" y="509" font-size="13.5" letter-spacing="3" fill="#8FA3C6">STACK</text>
    <text x="856" y="509" font-size="12.5" fill="#3C4D6E" text-anchor="end">stack.yml — readonly</text>
    <g font-size="13.5">
      <text x="44" y="540"><tspan fill="#34E7E7">languages:</tspan><tspan fill="#3C4D6E">&#160;&#160;&#160;&#160;&#160;[ </tspan><tspan fill="#C3D2EC">Java, C++, Python, SQL</tspan><tspan fill="#3C4D6E"> ]</tspan></text>
      <text x="44" y="566"><tspan fill="#34E7E7">backend:</tspan><tspan fill="#3C4D6E">&#160;&#160;&#160;&#160;&#160;&#160;&#160;[ </tspan><tspan fill="#C3D2EC">Spring Boot, gRPC, Hibernate, Aeron</tspan><tspan fill="#3C4D6E"> ]</tspan></text>
      <text x="44" y="592"><tspan fill="#34E7E7">streaming:</tspan><tspan fill="#3C4D6E">&#160;&#160;&#160;&#160;&#160;[ </tspan><tspan fill="#C3D2EC">Kafka, RocksDB, event-driven architecture</tspan><tspan fill="#3C4D6E"> ]</tspan></text>
      <text x="44" y="618"><tspan fill="#34E7E7">cloud_devops:</tspan><tspan fill="#3C4D6E">&#160;&#160;[ </tspan><tspan fill="#C3D2EC">AWS, Docker, Terraform, Kubernetes</tspan><tspan fill="#3C4D6E"> ]</tspan></text>
      <text x="44" y="644"><tspan fill="#34E7E7">observability:</tspan><tspan fill="#3C4D6E">&#160;[ </tspan><tspan fill="#C3D2EC">Datadog, PagerDuty, WIZ</tspan><tspan fill="#3C4D6E"> ]</tspan></text>
      <text x="44" y="670"><tspan fill="#34E7E7">datastores:</tspan><tspan fill="#3C4D6E">&#160;&#160;&#160;&#160;[ </tspan><tspan fill="#C3D2EC">MySQL, PostgreSQL, MongoDB</tspan><tspan fill="#3C4D6E"> ]</tspan></text>
    </g>
  </g>

