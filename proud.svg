<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" font-family="'SF Mono','SFMono-Regular',ui-monospace,'DejaVu Sans Mono','Menlo','Consolas',monospace" role="img" aria-label="A few things I'm proud of: Codeforces Expert 1600+, global rank 850 in Round 896 Div 2; JEE Advanced AIR 9684 among 1,000,000+ applicants; Kafka and RocksDB replication replacing Aeron middleware on trading servers; production SaaS connectors for Microsoft Dynamics 365 and Trello at Smartsheet">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10182B"/><stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34E7E7"/><stop offset="0.5" stop-color="#5B8DEF"/><stop offset="1" stop-color="#9B8CFF"/>
    </linearGradient>
    <linearGradient id="cyanG" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#34E7E7"/><stop offset="1" stop-color="#5BD7EF"/></linearGradient>
    <linearGradient id="blueG" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#5B8DEF"/><stop offset="1" stop-color="#8AB0FF"/></linearGradient>
    <filter id="ng" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect x="0" y="0" width="900" height="320" fill="#0A0E17"/>
  <rect x="12" y="12" width="876" height="296" rx="16" fill="url(#card)" stroke="#1E2A44" stroke-width="1.5"/>
  <rect x="12" y="12" width="876" height="296" rx="16" fill="none" stroke="url(#aurora)" stroke-width="1.5" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" opacity="0.85">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.1s" fill="freeze"/>
  </rect>

  <!-- header -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.2s" fill="freeze"/>
    <rect x="44" y="34" width="4" height="17" rx="2" fill="#9B8CFF"/>
    <text x="58" y="48" font-size="14" letter-spacing="3" fill="#8FA3C6">A&#160;FEW&#160;THINGS&#160;I&#39;M&#160;PROUD&#160;OF</text>
    <text x="856" y="48" font-size="13" fill="#3C4D6E" text-anchor="end">$ ./highlights</text>
  </g>
  <line x1="44" y1="64" x2="856" y2="64" stroke="#16223A" stroke-width="1"/>

  <!-- ===== top-left: Codeforces ===== -->
  <g opacity="0" transform="translate(0,8)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 8;0 0" dur="0.5s" begin="0.5s" fill="freeze"/>
    <rect x="44" y="78" width="400" height="100" rx="12" fill="#0E1627" stroke="#214B57"/>
    <circle cx="66" cy="103" r="3.5" fill="#34E7E7"/>
    <text x="78" y="107" font-size="11.5" letter-spacing="1.5" fill="#6F89A8">CODEFORCES&#160;·&#160;RATING</text>
    <text x="66" y="150" font-size="38" font-weight="700" fill="url(#cyanG)" filter="url(#ng)">1600+
      <animate attributeName="opacity" values="1;0.82;1" dur="3.6s" begin="1.4s" repeatCount="indefinite"/>
    </text>
    <g transform="translate(196,124)">
      <rect x="0" y="0" width="86" height="24" rx="12" fill="#0A1A1A" stroke="#2A6E6E"/>
      <text x="43" y="16" font-size="12" font-weight="700" fill="#9FE9E9" text-anchor="middle">EXPERT</text>
    </g>
    <text x="66" y="170" font-size="11.5" fill="#8398B8">global rank #850 · Round 896 (Div. 2)</text>
  </g>

  <!-- ===== top-right: JEE ===== -->
  <g opacity="0" transform="translate(0,8)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.64s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 8;0 0" dur="0.5s" begin="0.64s" fill="freeze"/>
    <rect x="456" y="78" width="400" height="100" rx="12" fill="#0E1627" stroke="#2B3F73"/>
    <circle cx="478" cy="103" r="3.5" fill="#5B8DEF"/>
    <text x="490" y="107" font-size="11.5" letter-spacing="1.5" fill="#6F89A8">JEE&#160;ADVANCED&#160;·&#160;2020</text>
    <text x="478" y="148" font-size="33" font-weight="700" fill="url(#blueG)" filter="url(#ng)">AIR 9684
      <animate attributeName="opacity" values="1;0.82;1" dur="3.6s" begin="1.6s" repeatCount="indefinite"/>
    </text>
    <text x="478" y="170" font-size="11.5" fill="#8398B8">among 1,000,000+ applicants nationwide</text>
  </g>

  <!-- ===== bottom-left: Kafka/RocksDB ===== -->
  <g opacity="0" transform="translate(0,8)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.78s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 8;0 0" dur="0.5s" begin="0.78s" fill="freeze"/>
    <rect x="44" y="190" width="400" height="100" rx="12" fill="#0E1627" stroke="#3E3A78"/>
    <circle cx="66" cy="215" r="3.5" fill="#9B8CFF"/>
    <text x="78" y="219" font-size="11.5" letter-spacing="1.5" fill="#6F89A8">SYSTEMS&#160;·&#160;TRADING&#160;INFRA</text>
    <text x="66" y="248" font-size="16" font-weight="700" fill="#D6CEFA">Kafka + RocksDB replication</text>
    <text x="66" y="268" font-size="11.5" fill="#8398B8">replaced Aeron middleware on trading servers —</text>
    <text x="66" y="283" font-size="11.5" fill="#8398B8">better fault tolerance, cleaner failure modes</text>
  </g>

  <!-- ===== bottom-right: connectors ===== -->
  <g opacity="0" transform="translate(0,8)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.92s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 8;0 0" dur="0.5s" begin="0.92s" fill="freeze"/>
    <rect x="456" y="190" width="400" height="100" rx="12" fill="#0E1627" stroke="#6E5526"/>
    <circle cx="478" cy="215" r="3.5" fill="#FFB454"/>
    <text x="490" y="219" font-size="11.5" letter-spacing="1.5" fill="#6F89A8">SHIPPED&#160;·&#160;SMARTSHEET</text>
    <text x="478" y="248" font-size="16" font-weight="700" fill="#FFD79A">Production SaaS connectors</text>
    <text x="478" y="268" font-size="11.5" fill="#8398B8">Microsoft Dynamics 365 + Trello connectors,</text>
    <text x="478" y="283" font-size="11.5" fill="#8398B8">bi-directional enterprise data sync</text>
  </g>
</svg>
