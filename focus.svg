<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 296" width="900" height="296" font-family="'SF Mono','SFMono-Regular',ui-monospace,'DejaVu Sans Mono','Menlo','Consolas',monospace" role="img" aria-label="What I work on: distributed systems, low-latency infrastructure, fault tolerance and observability, platform engineering">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10182B"/><stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34E7E7"/><stop offset="0.5" stop-color="#5B8DEF"/><stop offset="1" stop-color="#9B8CFF"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34E7E7" stop-opacity="0"/><stop offset="0.5" stop-color="#34E7E7" stop-opacity="0.5"/><stop offset="1" stop-color="#34E7E7" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="cardClip"><rect x="12" y="12" width="876" height="272" rx="16"/></clipPath>
  </defs>

  <rect x="0" y="0" width="900" height="296" fill="#0A0E17"/>
  <rect x="12" y="12" width="876" height="272" rx="16" fill="url(#card)" stroke="#1E2A44" stroke-width="1.5"/>
  <rect x="12" y="12" width="876" height="272" rx="16" fill="none" stroke="url(#aurora)" stroke-width="1.5" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" opacity="0.85">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.1s" fill="freeze"/>
  </rect>

  <!-- scanline sweep on load -->
  <g clip-path="url(#cardClip)">
    <rect x="13" y="60" width="874" height="44" fill="url(#scan)" opacity="0">
      <animate attributeName="y" values="56;250" dur="1.3s" begin="0.4s" fill="freeze" calcMode="ease-out"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="1.3s" begin="0.4s" fill="freeze"/>
    </rect>
  </g>

  <!-- header -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.25s" fill="freeze"/>
    <rect x="44" y="34" width="4" height="17" rx="2" fill="#34E7E7"/>
    <text x="58" y="48" font-size="14" letter-spacing="3" fill="#8FA3C6">WHAT&#160;I&#160;WORK&#160;ON</text>
    <text x="856" y="48" font-size="13" fill="#3C4D6E" text-anchor="end">[ 04 ]</text>
  </g>
  <line x1="44" y1="64" x2="856" y2="64" stroke="#16223A" stroke-width="1"/>

  <!-- modules -->
  <!-- 1 -->
  <g opacity="0" transform="translate(-12,0)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.55s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="-12 0;0 0" dur="0.5s" begin="0.55s" fill="freeze"/>
    <circle cx="48" cy="92" r="4" fill="#34E7E7"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="1.5s" repeatCount="indefinite"/></circle>
    <text x="62" y="97" font-size="15" font-weight="700" fill="#9FE9E9">distributed-systems</text>
    <text x="62" y="117" font-size="12.5" fill="#9FB0CE">event-driven replication · keeping state in sync · designing for the failure case first</text>
  </g>
  <!-- 2 -->
  <g opacity="0" transform="translate(-12,0)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.72s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="-12 0;0 0" dur="0.5s" begin="0.72s" fill="freeze"/>
    <circle cx="48" cy="144" r="4" fill="#5B8DEF"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="1.7s" repeatCount="indefinite"/></circle>
    <text x="62" y="149" font-size="15" font-weight="700" fill="#AFC3F0">low-latency-infra</text>
    <text x="62" y="169" font-size="12.5" fill="#9FB0CE">memory layout, threading, and hot-path tuning — habits that stuck from trading systems</text>
  </g>
  <!-- 3 -->
  <g opacity="0" transform="translate(-12,0)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.89s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="-12 0;0 0" dur="0.5s" begin="0.89s" fill="freeze"/>
    <circle cx="48" cy="196" r="4" fill="#9B8CFF"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="1.9s" repeatCount="indefinite"/></circle>
    <text x="62" y="201" font-size="15" font-weight="700" fill="#C7BEF5">fault-tolerance + observability</text>
    <text x="62" y="221" font-size="12.5" fill="#9FB0CE">services that fail gracefully and tell you why — wired through Datadog / PagerDuty</text>
  </g>
  <!-- 4 -->
  <g opacity="0" transform="translate(-12,0)">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.06s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="-12 0;0 0" dur="0.5s" begin="1.06s" fill="freeze"/>
    <circle cx="48" cy="248" r="4" fill="#FFB454"><animate attributeName="opacity" values="1;0.4;1" dur="2.4s" begin="2.1s" repeatCount="indefinite"/></circle>
    <text x="62" y="253" font-size="15" font-weight="700" fill="#FFCE8A">platform-engineering</text>
    <text x="62" y="273" font-size="12.5" fill="#9FB0CE">monolith decomposition · MySQL query-plan tuning · production SaaS connectors</text>
  </g>
</svg>
