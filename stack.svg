<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" font-family="'SF Mono','SFMono-Regular',ui-monospace,'DejaVu Sans Mono','Menlo','Consolas',monospace" role="img" aria-label="Stack: Java, C++, Python, SQL; Spring Boot, gRPC, Hibernate, Aeron; Kafka, RocksDB, event-driven architecture; AWS, Docker, Terraform, Kubernetes; Datadog, PagerDuty, WIZ; MySQL, PostgreSQL, MongoDB">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10182B"/><stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34E7E7"/><stop offset="0.5" stop-color="#5B8DEF"/><stop offset="1" stop-color="#9B8CFF"/>
    </linearGradient>
    <clipPath id="cardClip"><rect x="12" y="12" width="876" height="276" rx="16"/></clipPath>
  </defs>

  <rect x="0" y="0" width="900" height="300" fill="#0A0E17"/>
  <rect x="12" y="12" width="876" height="276" rx="16" fill="url(#card)" stroke="#1E2A44" stroke-width="1.5"/>
  <rect x="12" y="12" width="876" height="276" rx="16" fill="none" stroke="url(#aurora)" stroke-width="1.5" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100" opacity="0.85">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.1s" fill="freeze"/>
  </rect>

  <!-- window chrome -->
  <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.2s" fill="freeze"/>
    <circle cx="46" cy="41" r="5.5" fill="#33405E"/>
    <circle cx="66" cy="41" r="5.5" fill="#33405E"/>
    <circle cx="86" cy="41" r="5.5" fill="#33405E"/>
    <text x="118" y="46" font-size="13.5" fill="#8FA3C6">stack.yml</text>
    <text x="856" y="46" font-size="12.5" fill="#3C4D6E" text-anchor="end">— readonly · 6 modules</text>
  </g>
  <line x1="30" y1="60" x2="870" y2="60" stroke="#16223A" stroke-width="1"/>
  <!-- gutter divider -->
  <line x1="76" y1="60" x2="76" y2="276" stroke="#16223A" stroke-width="1"/>

  <!-- code -->
  <g font-size="14">
    <!-- comment -->
    <g opacity="0" transform="translate(-10,0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.40s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="-10 0;0 0" dur="0.45s" begin="0.40s" fill="freeze"/>
      <text x="66" y="92" fill="#33405E" text-anchor="end">1</text>
      <text x="92" y="92" fill="#5E7A6E" font-style="italic"># stack.yml — what I build with</text>
    </g>
    <!-- languages -->
    <g opacity="0" transform="translate(-10,0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.54s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="-10 0;0 0" dur="0.45s" begin="0.54s" fill="freeze"/>
      <text x="66" y="122" fill="#33405E" text-anchor="end">2</text>
      <text x="92" y="122"><tspan fill="#34E7E7">languages:</tspan><tspan fill="#3C4D6E">     [ </tspan><tspan fill="#C3D2EC">Java, C++, Python, SQL</tspan><tspan fill="#3C4D6E"> ]</tspan></text>
    </g>
    <!-- backend -->
    <g opacity="0" transform="translate(-10,0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.66s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="-10 0;0 0" dur="0.45s" begin="0.66s" fill="freeze"/>
      <text x="66" y="152" fill="#33405E" text-anchor="end">3</text>
      <text x="92" y="152"><tspan fill="#34E7E7">backend:</tspan><tspan fill="#3C4D6E">       [ </tspan><tspan fill="#C3D2EC">Spring Boot, gRPC, Hibernate, Aeron</tspan><tspan fill="#3C4D6E"> ]</tspan></text>
    </g>
    <!-- streaming -->
    <g opacity="0" transform="translate(-10,0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.78s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="-10 0;0 0" dur="0.45s" begin="0.78s" fill="freeze"/>
      <text x="66" y="182" fill="#33405E" text-anchor="end">4</text>
      <text x="92" y="182"><tspan fill="#34E7E7">streaming:</tspan><tspan fill="#3C4D6E">     [ </tspan><tspan fill="#C3D2EC">Kafka, RocksDB, event-driven architecture</tspan><tspan fill="#3C4D6E"> ]</tspan></text>
    </g>
    <!-- cloud_devops -->
    <g opacity="0" transform="translate(-10,0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="0.90s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="-10 0;0 0" dur="0.45s" begin="0.90s" fill="freeze"/>
      <text x="66" y="212" fill="#33405E" text-anchor="end">5</text>
      <text x="92" y="212"><tspan fill="#34E7E7">cloud_devops:</tspan><tspan fill="#3C4D6E">  [ </tspan><tspan fill="#C3D2EC">AWS, Docker, Terraform, Kubernetes</tspan><tspan fill="#3C4D6E"> ]</tspan></text>
    </g>
    <!-- observability -->
    <g opacity="0" transform="translate(-10,0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="1.02s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="-10 0;0 0" dur="0.45s" begin="1.02s" fill="freeze"/>
      <text x="66" y="242" fill="#33405E" text-anchor="end">6</text>
      <text x="92" y="242"><tspan fill="#34E7E7">observability:</tspan><tspan fill="#3C4D6E"> [ </tspan><tspan fill="#C3D2EC">Datadog, PagerDuty, WIZ</tspan><tspan fill="#3C4D6E"> ]</tspan></text>
    </g>
    <!-- datastores -->
    <g opacity="0" transform="translate(-10,0)">
      <animate attributeName="opacity" from="0" to="1" dur="0.45s" begin="1.14s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="-10 0;0 0" dur="0.45s" begin="1.14s" fill="freeze"/>
      <text x="66" y="272" fill="#33405E" text-anchor="end">7</text>
      <text x="92" y="272"><tspan fill="#34E7E7">datastores:</tspan><tspan fill="#3C4D6E">    [ </tspan><tspan fill="#C3D2EC">MySQL, PostgreSQL, MongoDB</tspan><tspan fill="#3C4D6E"> ]</tspan><tspan fill="#34E7E7" font-weight="700"> ▌<animate attributeName="opacity" values="1;1;0;0;1" dur="1.1s" begin="1.6s" repeatCount="indefinite"/></tspan></text>
    </g>
  </g>
</svg>
